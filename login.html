<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SmartAgro — Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: radial-gradient(circle at top left, #07111a 0%, #000 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #e6f6ef;
      font-family: "Poppins", sans-serif;
      overflow: hidden;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      padding: 40px 36px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      width: 320px;
      text-align: center;
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.15);
      animation: fadeIn 0.8s ease-in-out;
    }

    .login-box h1 {
      color: var(--accent, #22c55e);
      font-size: 1.6rem;
      margin-bottom: 12px;
      text-shadow: 0 0 6px rgba(34, 197, 94, 0.6);
    }

    .login-box p {
      font-size: 0.9rem;
      color: #9da7b5;
      margin-bottom: 24px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      color: #e6f6ef;
      font-size: 0.95rem;
      margin-bottom: 14px;
      transition: all 0.25s ease-in-out;
    }

    .login-box input:focus {
      box-shadow: 0 0 10px #22c55e;
      background: rgba(255, 255, 255, 0.15);
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: var(--accent, #22c55e);
      color: #01210d;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease-in-out;
      font-size: 1rem;
      margin-top: 6px;
    }

    .login-box button:hover {
      background: #32ff8b;
      box-shadow: 0 0 12px #32ff8b;
      transform: translateY(-2px);
    }

    .footer-text {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .footer-text a {
      color: #22c55e;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.25s ease-in-out;
    }

    .footer-text a:hover {
      text-shadow: 0 0 6px #32ff8b;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 600px) {
      .login-box {
        width: 85%;
        padding: 30px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>SmartAgro</h1>
    <p>Sign in to access your IoT dashboard</p>

    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="login()">Login</button>

    <div class="footer-text">
      Don’t have an account?
      <a href="signup.html">Create one</a>
    </div>

    <div class="footer-text" style="margin-top: 12px;">
      © 2025 SmartAgro · IoT Smart Farming
    </div>
  </div>

<script>
  function login() {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();

    if (!u || !p) {
      alert("Please enter username and password.");
      return;
    }

    // get local accounts
    const accounts = JSON.parse(localStorage.getItem("accounts") || "{}");

    // ✅ fallback built-in login
    if ((u === "admin" && p === "admin123") || (accounts[u] && accounts[u] === p)) {
      localStorage.setItem("isAuthenticated", "true");
      window.location.href = "index.html";
    } else {
      alert("Invalid credentials. Try again or create a new account.");
    }
  }
</script>

</body>
</html>
